name: Update ADH Filter

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Convert
        run: |
          set -e

          # 1. 下载源文件
          curl -sL "https://raw.githubusercontent.com/zirawell/R-Store/refs/heads/main/Rule/QuanX/Adblock/All/filter/allAdBlock.list" -o s1.txt

          curl -sL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/release/rule/QuantumultX/AdvertisingLite/AdvertisingLite.list" -o s2.txt

          # 2. 清理空行、注释、行首行尾空格
          cat s1.txt s2.txt \
            | sed 's/\r$//' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -vE "^(#|;|!|//|$)" \
            > clean_source.tmp

          # 3. 只转换低风险域名类规则
          > rules.tmp

          # DOMAIN,example.com / HOST,example.com
          grep -Ei "^(DOMAIN|HOST)," clean_source.tmp \
            | awk -F',' '{print "||" $2 "^"}' \
            >> rules.tmp || true

          # DOMAIN-SUFFIX,example.com / HOST-SUFFIX,example.com
          grep -Ei "^(DOMAIN-SUFFIX|HOST-SUFFIX)," clean_source.tmp \
            | awk -F',' '{print "||" $2 "^"}' \
            >> rules.tmp || true

          # 4. 合法性过滤 + 去重
          grep -Ei '^\|\|[A-Za-z0-9_.-]+\^$' rules.tmp \
            | grep -vE "^\|\|localhost\^$" \
            | grep -vE "^\|\|\.\^$" \
            | grep -vE "\.\.\." \
            | sort -u \
            > unique_rules.tmp

          rule_count=$(wc -l < unique_rules.tmp)

          # 5. 生成结果文件
          echo "! Title: AdGuardHomeAllAdBlockList - Conservative Plus" > AdGuardHomeAllAdBlockList.txt
          echo "! Authors: zirawell, blackmatrix7, Apoclypt1c" >> AdGuardHomeAllAdBlockList.txt
          echo "! Source 1: https://raw.githubusercontent.com/zirawell/R-Store/refs/heads/main/Rule/QuanX/Adblock/All/filter/allAdBlock.list" >> AdGuardHomeAllAdBlockList.txt
          echo "! Source 2: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/release/rule/QuantumultX/AdvertisingLite/AdvertisingLite.list" >> AdGuardHomeAllAdBlockList.txt
          echo "! Last Updated: $(date '+%Y-%m-%d %H:%M:%S') (UTC)" >> AdGuardHomeAllAdBlockList.txt
          echo "! Total Rules: $rule_count" >> AdGuardHomeAllAdBlockList.txt
          echo "!" >> AdGuardHomeAllAdBlockList.txt
          cat unique_rules.tmp >> AdGuardHomeAllAdBlockList.txt

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AdGuardHomeAllAdBlockList.txt

          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Auto-update conservative plus AGH rules on $(date +'%Y-%m-%d')"
          git push
