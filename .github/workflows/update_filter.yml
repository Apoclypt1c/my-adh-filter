name: Update ADH Filter

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Convert
        run: |
          set -e

          # 1. 下载源文件
          curl -sL "https://raw.githubusercontent.com/zirawell/R-Store/refs/heads/main/Rule/QuanX/Adblock/All/filter/allAdBlock.list" -o s1.txt

          # 暂时不要把 HTTPDNS 全局加入路由器
          # curl -sL "https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/HTTPDNS.Block.list" -o s2.txt

          # 2. 清理空行、注释、空格
          cat s1.txt \
            | sed 's/[[:space:]]//g' \
            | grep -vE "^(#|;|!|$)" \
            > clean_source.tmp

          # 3. 只转换域名类规则
          > rules.tmp

          # DOMAIN,example.com / HOST,example.com
          grep -Ei "^(DOMAIN|HOST)," clean_source.tmp \
            | awk -F',' '{print "||" $2 "^"}' \
            >> rules.tmp || true

          # DOMAIN-SUFFIX,example.com / HOST-SUFFIX,example.com
          grep -Ei "^(DOMAIN-SUFFIX|HOST-SUFFIX)," clean_source.tmp \
            | awk -F',' '{print "||" $2 "^"}' \
            >> rules.tmp || true

          # 4. 主动排除高风险关键词和无效项
          grep -vE "^\*\w+\*$" rules.tmp \
            | grep -vE "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$" \
            | grep -vE "^\|\|localhost\^$" \
            | sort -u \
            > unique_rules.tmp

          rule_count=$(wc -l < unique_rules.tmp)

          # 5. 生成结果文件
          echo "! Title: AdGuardHomeAllAdBlockList - Conservative" > AdGuardHomeAllAdBlockList.txt
          echo "! Authors: zirawell, Apoclypt1c" >> AdGuardHomeAllAdBlockList.txt
          echo "! Last Updated: $(date '+%Y-%m-%d %H:%M:%S') (UTC)" >> AdGuardHomeAllAdBlockList.txt
          echo "! Total Rules: $rule_count" >> AdGuardHomeAllAdBlockList.txt
          echo "!" >> AdGuardHomeAllAdBlockList.txt
          cat unique_rules.tmp >> AdGuardHomeAllAdBlockList.txt

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AdGuardHomeAllAdBlockList.txt

          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Auto-update conservative AGH rules on $(date +'%Y-%m-%d')"
          git push
