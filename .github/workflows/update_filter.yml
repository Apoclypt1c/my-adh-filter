name: Update ADH Filter
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 必须增加权限声明，否则脚本无法推送文件回仓库
permissions:
  contents: write

jobs:
  convert_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到 v4 解决 Node.js 版本警告

      - name: Download and Convert
        run: |
          curl -sL "https://raw.githubusercontent.com/zirawell/R-Store/refs/heads/main/Rule/QuanX/Adblock/All/filter/allAdBlock.list" -o raw_list.txt
          
          echo "! Title: AdGuardHomeAllAdBlockList" > AdGuardHomeAllAdBlockList.txt
          echo "! Last Modified: $(date)" >> AdGuardHomeAllAdBlockList.txt
          echo "! Source: zirawell R-Store" >> AdGuardHomeAllAdBlockList.txt
          echo "!" >> AdGuardHomeAllAdBlockList.txt

          grep -Ei "^host" raw_list.txt | awk -F',' '{print "||" $2 "^"}' | sed 's/ //g' >> AdGuardHomeAllAdBlockList.txt
          grep -Ei "^ip-cidr" raw_list.txt | awk -F',' '{print $2}' | sed 's/ //g' >> AdGuardHomeAllAdBlockList.txt
          
          head -n 4 AdGuardHomeAllAdBlockList.txt > header.tmp
          tail -n +5 AdGuardHomeAllAdBlockList.txt | sort -u >> header.tmp
          mv header.tmp AdGuardHomeAllAdBlockList.txt

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AdGuardHomeAllAdBlockList.txt
          # 检查是否有内容变化，防止无意义的报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update: AdGuardHomeAllAdBlockList $(date +'%Y-%m-%d')"
          git push
