name: Update ADH Filter
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Convert
        run: |
          # 1. 下载源文件
          curl -sL "https://raw.githubusercontent.com/zirawell/R-Store/refs/heads/main/Rule/QuanX/Adblock/All/filter/allAdBlock.list" -o s1.txt
          curl -sL "https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/filter/filter.list" -o s2.txt
          curl -sL "https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/HTTPDNS.Block.list" -o s3.txt
          curl -sL "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list" -o s4.txt
          
          # 2. 合并并初步清理：删除空行和以 # 或 ; 开头的纯注释行
          cat s1.txt s2.txt s3.txt s4.txt | sed 's/ //g' | grep -vE "^(#|;|$)" > clean_source.tmp

          # 3. 深度解析逻辑
          # 3a. 提取 HOST/DOMAIN 类 (转换为 ||domain.com^)
          grep -Ei "^(host|domain)" clean_source.tmp | grep -iv "keyword" | awk -F',' '{print "||" $2 "^"}' >> rules.tmp
          
          # 3b. 提取 KEYWORD 类 (转换为 *keyword*)
          # 兼容 DOMAIN-KEYWORD 或直接是 KEYWORD 开头的行
          grep -Ei "keyword" clean_source.tmp | awk -F',' '{print "*" $2 "*"}' >> rules.tmp
          
          # 3c. 提取 IP-CIDR 类
          grep -Ei "^ip" clean_source.tmp | awk -F',' '{print $2}' >> rules.tmp
          
          # 4. 彻底去重排序
          sort -u rules.tmp | grep -v "^$" > unique_rules.tmp
          rule_count=$(wc -l < unique_rules.tmp)
          
          # 5. 生成结果文件
          echo "! Title: AdGuardHomeAllAdBlockList" > AdGuardHomeAllAdBlockList.txt
          echo "! Authors: zirawell, fmz200, VirgilClyne, ACL4SSR" >> AdGuardHomeAllAdBlockList.txt
          echo "! Last Updated: $(date '+%Y-%m-%d %H:%M:%S') (UTC)" >> AdGuardHomeAllAdBlockList.txt
          echo "! Total Rules: $rule_count" >> AdGuardHomeAllAdBlockList.txt
          echo "!" >> AdGuardHomeAllAdBlockList.txt
          cat unique_rules.tmp >> AdGuardHomeAllAdBlockList.txt

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AdGuardHomeAllAdBlockList.txt
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Auto-update: $rule_count rules on $(date +'%Y-%m-%d')"
          git push
